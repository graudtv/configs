# vim:fileencoding=utf-8:foldmethod=marker

# [ Theme ]
# BEGIN_KITTY_THEME
# VSCode_Dark
include current-theme.conf
# END_KITTY_THEME

# [ Default config - for experimenting ]
include default.conf

# [ Misc ]
font_size 18.0
enable_audio_bell no
linux_display_server x11

# [ Tab bar configuration ]
tab_bar_edge top
tab_bar_margin_height 10.0 0.0
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "[{index}] {title}"

# [ Remote control ]
allow_remote_control yes
listen_on unix:@mykitty

# [ Key bindings ]
# Switch / move tabs
map ctrl+shift+h move_tab_backward
map ctrl+shift+j previous_tab
map ctrl+shift+k next_tab
map ctrl+shift+l move_tab_forward
#map ctrl+p paste_from_selection
map ctrl+shift+p paste_from_selection

# Rename the current tab
map f2 launch --type=overlay ~/scripts/kitty/tabname

map ctrl+t launch --type=tab --tab-title=new --cwd=current --location=after
map kitty_mod+t launch --type=tab --tab-title=new --location=after
#map ctrl+t combine : launch --type=tab --tab-title=new --cwd=current : launch --type=overlay ~/scripts/kitty/tabname

map f6 save_as_session --save-only --use-foreground-process --base-dir ~/.config/kitty/sessions
map f7 goto_session ~/.config/kitty/sessions

#map kitty_mod+t combine : new_tab_with_cwd : set_tab_title new

